<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">gmail-sheets-property-mailer 全体アーキテクチャ</title>
  <desc id="desc">Google Sheets、Apps Script、Gmail、Google Groups を使った物件メール配信の構成図</desc>
  <defs>
    <style>
      .bg{fill:#f7fbff}.panel{fill:#fff;stroke:#d7e3f4;stroke-width:2}.blue{fill:#0b66c3}.green{fill:#1e8e3e}.orange{fill:#f29900}.purple{fill:#6f42c1}.text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP','Yu Gothic',Meiryo,sans-serif;fill:#172033}.muted{fill:#53657d}.small{font-size:20px}.body{font-size:24px}.h2{font-size:30px;font-weight:700}.h1{font-size:48px;font-weight:800}.label{font-size:22px;font-weight:700}.white{fill:#fff}.arrow{stroke:#0b66c3;stroke-width:5;fill:none;marker-end:url(#arrow)}.arrowGreen{stroke:#1e8e3e;stroke-width:5;fill:none;marker-end:url(#arrowGreen)}.arrowOrange{stroke:#f29900;stroke-width:5;fill:none;marker-end:url(#arrowOrange)}.tag{fill:#eef7ef;stroke:#1e8e3e;stroke-width:2}.warn{fill:#fff7e6;stroke:#f29900;stroke-width:2}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0b66c3"/></marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1e8e3e"/></marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#f29900"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="1000"/>
  <text class="h1 text" x="70" y="70">gmail-sheets-property-mailer 全体アーキテクチャ</text>
  <text class="body muted" x="72" y="108">Google Sheets + Apps Script で無料寄りに物件メールを安全配信する最小構成</text>

  <rect class="panel" x="50" y="140" width="1040" height="150" rx="24"/>
  <circle class="blue" cx="90" cy="180" r="28"/><text class="label white" x="81" y="189">1</text>
  <text class="h2 text" x="130" y="188">GitHub リポジトリ</text>
  <text class="small muted" x="130" y="224">コード管理・テンプレート・説明書</text>
  <text class="small text" x="420" y="180">README.md / appsscript.json / src/Code.js / src/GoogleGroupsMode.js</text>
  <text class="small text" x="420" y="220">samples/*.csv / docs/BULK_SENDING.md / docs/COMPLIANCE_CHECKLIST.md</text>
  <path class="arrow" d="M570 290 L570 330"/>

  <rect class="panel" x="50" y="330" width="1040" height="200" rx="24"/>
  <circle class="green" cx="90" cy="370" r="28"/><text class="label white" x="81" y="379">2</text>
  <text class="h2 text" x="130" y="378">Google Sheets（データ管理）</text>
  <text class="label text" x="130" y="425">Config</text><text class="small muted" x="260" y="425">送信設定：SENDER_NAME / REPLY_TO / TEST_MODE / TEST_EMAIL / MAX_SEND_PER_RUN</text>
  <text class="label text" x="130" y="465">Recipients</text><text class="small muted" x="260" y="465">宛先管理：email / company / name / status / consent / last_sent_at</text>
  <rect class="tag" x="830" y="438" width="210" height="38" rx="10"/><text class="small green" x="852" y="464">active + consent=yes</text>
  <text class="label text" x="130" y="505">Listings</text><text class="small muted" x="260" y="505">物件一覧：title / price / area / layout / station / url / status / sent_at</text>
  <rect class="tag" x="830" y="480" width="210" height="38" rx="10"/><text class="small green" x="862" y="506">status空欄のみ</text>
  <path class="arrowGreen" d="M570 530 L570 570"/>

  <rect class="panel" x="50" y="570" width="1040" height="190" rx="24"/>
  <circle class="orange" cx="90" cy="610" r="28"/><text class="label white" x="81" y="619">3</text>
  <text class="h2 text" x="130" y="618">Apps Script（処理ロジック）</text>
  <text class="small text" x="130" y="665">sendDailyPropertyMail() / createDailyTrigger() / sendToGoogleGroup()</text>
  <text class="small text" x="130" y="705">1. LockServiceで二重実行防止 → 2. Config読込 → 3. 未送信物件取得 → 4. 宛先抽出</text>
  <text class="small text" x="130" y="742">5. TEST_MODE判定 → 6. 送信 → 7. sent_at更新 → 8. SendLog記録</text>
  <rect class="warn" x="770" y="625" width="275" height="95" rx="18"/>
  <text class="small orange" x="790" y="662">MailApp.getRemainingDailyQuota()</text>
  <text class="small orange" x="790" y="695">+ MAX_SEND_PER_RUN で安全制御</text>
  <path class="arrowOrange" d="M570 760 L570 800"/>

  <rect class="panel" x="50" y="800" width="1040" height="150" rx="24"/>
  <circle class="blue" cx="90" cy="840" r="28"/><text class="label white" x="81" y="849">4</text>
  <text class="h2 text" x="130" y="848">送信モード</text>
  <rect x="290" y="825" width="350" height="95" rx="18" fill="#eef6ff" stroke="#0b66c3" stroke-width="2"/>
  <text class="label text" x="315" y="862">無料・個別配信モード</text>
  <text class="small muted" x="315" y="900">Apps Script → Gmail/MailApp → 個別宛先</text>
  <rect x="675" y="825" width="370" height="95" rx="18" fill="#f5efff" stroke="#6f42c1" stroke-width="2"/>
  <text class="label text" x="700" y="862">Google Groups モード</text>
  <text class="small muted" x="700" y="900">Apps Script → Google Group → メンバー配信</text>

  <rect class="panel" x="1140" y="140" width="410" height="390" rx="24"/>
  <rect class="blue" x="1140" y="140" width="410" height="62" rx="24"/>
  <text class="h2 white" x="1175" y="181">全体の処理の流れ</text>
  <text class="small text" x="1180" y="245">物件を Listings へ登録</text>
  <text class="small text" x="1180" y="295">宛先を Recipients で管理</text>
  <text class="small text" x="1180" y="345">Apps Script が条件判定</text>
  <text class="small text" x="1180" y="395">本文生成 → Gmail / Google Group へ送信</text>
  <text class="small text" x="1180" y="445">SendLog へ記録</text>
  <text class="small text" x="1180" y="495">次回は未送信物件だけ対象化</text>

  <rect class="panel" x="1140" y="560" width="410" height="390" rx="24"/>
  <rect class="orange" x="1140" y="560" width="410" height="62" rx="24"/>
  <text class="h2 white" x="1175" y="601">テスト → 本番の流れ</text>
  <text class="small text" x="1180" y="665">1. Google Sheets 作成</text>
  <text class="small text" x="1180" y="710">2. Config / Recipients / Listings 準備</text>
  <text class="small text" x="1180" y="755">3. Apps Script にコード貼り付け</text>
  <text class="small text" x="1180" y="800">4. TEST_MODE=true, TEST_EMAIL を設定</text>
  <text class="small text" x="1180" y="845">5. sendDailyPropertyMail() を手動実行</text>
  <text class="small text" x="1180" y="890">6. 問題なければ TEST_MODE=false + trigger作成</text>
</svg>
